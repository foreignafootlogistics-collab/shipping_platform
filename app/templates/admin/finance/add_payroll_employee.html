{% extends "layout_admin.html" %}
{% block title %}Add Payroll Employee{% endblock %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
  <div>
    <h4 class="mb-1">Add Payroll Employee</h4>
    <div class="text-muted">Add staff members to payroll</div>
  </div>

  <a href="{{ url_for('finance.payroll_dashboard') }}" class="btn btn-outline-secondary">
    Back to Payroll
  </a>
</div>

<div class="card p-4">
  <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="mb-3">
      <label class="form-label">Employee / Staff User</label>
      <select name="user_id" class="form-select" required>
        <option value="">Select employee</option>
        {% for u in users %}
          <option value="{{ u.id }}">
            {{ u.full_name or u.email }} — {{ u.role }} — {{ u.email }}
          </option>
        {% endfor %}
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label">Pay Type</label>
      <select name="pay_type" id="payType" class="form-select">
        <option value="salary">Salary</option>
        <option value="hourly">Hourly</option>
      </select>
    </div>

    <div class="mb-3" id="salaryBox">
      <label class="form-label">Base Salary / Pay Period</label>
      <input type="number" step="0.01" min="0" name="base_salary" class="form-control" placeholder="Example: 50000">
    </div>

    <div class="mb-3 d-none" id="hourlyBox">
      <label class="form-label">Hourly Rate</label>
      <input type="number" step="0.01" min="0" name="hourly_rate" class="form-control" placeholder="Example: 800">
    </div>

    <button class="btn btn-primary">
      Add Employee
    </button>
  </form>
</div>

<script>
const payType = document.getElementById("payType");
const salaryBox = document.getElementById("salaryBox");
const hourlyBox = document.getElementById("hourlyBox");

payType.addEventListener("change", function () {
  if (this.value === "hourly") {
    salaryBox.classList.add("d-none");
    hourlyBox.classList.remove("d-none");
  } else {
    hourlyBox.classList.add("d-none");
    salaryBox.classList.remove("d-none");
  }
});
</script>

{% endblock %}
